name = "celphones-backend"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Base de datos D1 (SQLite). El database_id lo genera:  wrangler d1 create celphones
# Pégalo aquí después de crearla.
[[d1_databases]]
binding = "DB"
database_name = "celphones"
database_id = "29ae22ee-68f2-468e-b09a-c3a1136caf95"

# Almacén de archivos (fotos: cédula, momento de compra, equipo). Créalo con:
#   npx wrangler r2 bucket create celphones-media
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "celphones-media"

# Tu Project ID de Firebase (no es secreto). Lo ves en la consola de Firebase.
[vars]
FIREBASE_PROJECT_ID = "celphones-data-shop"
