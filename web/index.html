<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="celphones_data_shop">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>celphones_data_shop</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Splash mientras carga el engine de Flutter: evita el flash en blanco. -->
  <style>
    #splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: linear-gradient(135deg, #F57C00, #E65100);
      transition: opacity .4s ease; z-index: 9999;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .logo {
      width: 84px; height: 84px; border-radius: 50%; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; box-shadow: 0 6px 16px rgba(0,0,0,.2);
    }
    #splash .spin {
      width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: splashspin .8s linear infinite;
    }
    @keyframes splashspin { to { transform: rotate(360deg); } }
  </style>
  <div id="splash">
    <div class="logo">
      <!-- mismo icono del login: Material phone_iphone en naranja -->
      <svg width="46" height="46" viewBox="0 0 24 24" fill="#F57C00">
        <path d="M15.5 1h-8A2.5 2.5 0 0 0 5 3.5v17A2.5 2.5 0 0 0 7.5 23h8a2.5 2.5 0 0 0 2.5-2.5v-17A2.5 2.5 0 0 0 15.5 1zm-4 21c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM16 18H7V4h9v14z"/>
      </svg>
    </div>
    <div class="spin"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('hide'); setTimeout(function () { s.remove(); }, 400); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
